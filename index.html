<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANTED - MAZE.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');

        :root {
            --paper: #d4c2a1;
            --ink: #1a1512;
            --blood: #8b0000;
        }

        body {
            background-color: #050505;
            color: var(--ink);
            font-family: 'Special Elite', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            cursor: crosshair;
        }

        @keyframes poster-sway {
            0% { transform: rotate(-1deg) translateY(0px); }
            50% { transform: rotate(1deg) translateY(-5px); }
            100% { transform: rotate(-1deg) translateY(0px); }
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--blood), -2px 0 #000; }
            25% { text-shadow: -2px 0 var(--blood), 2px 0 #000; }
            50% { text-shadow: 2px 2px var(--blood), -1px -1px #000; }
            100% { text-shadow: 0 0 var(--blood); }
        }

        .poster {
            background: var(--paper);
            width: 95%;
            max-width: 800px; /* Немного расширил, чтобы аватар влез */
            padding: 60px 40px;
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,0.9), inset 0 0 80px rgba(0,0,0,0.2);
            animation: poster-sway 5s ease-in-out infinite;
            border: 2px solid #2b1d12;
            clip-path: polygon(0% 1%, 5% 0%, 95% 1%, 100% 0%, 99% 20%, 100% 50%, 99% 80%, 100% 98%, 95% 100%, 5% 99%, 0% 100%, 1% 50%);
        }

        /* Пыль на фоне бумаги */
        .poster::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.15;
            pointer-events: none;
        }

        .header-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-bottom: 10px double var(--ink);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header-wanted {
            font-size: clamp(60px, 10vw, 100px);
            margin: 0;
            letter-spacing: 12px;
            text-align: left;
            font-weight: 900;
            animation: glitch 0.3s infinite alternate;
        }

        /* Стили для аватара подозреваемого */
        .subject-avatar {
            width: 150px;
            height: 150px;
            border: 5px solid var(--ink);
            object-fit: cover;
            object-position: top center; /* Фокус на лице Микан */
            filter: grayscale(1) sepia(0.5) contrast(1.3) brightness(0.9); /* Эффект старой печати */
        }

        .alias {
            font-size: 45px;
            background: var(--ink);
            color: var(--paper);
            padding: 10px 50px;
            display: block;
            margin: 0 auto 30px auto;
            width: fit-content;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 0 var(--blood);
        }

        .main-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 25px;
            border: 3px dashed var(--ink);
            background: rgba(0,0,0,0.05);
        }

        .stat-box b {
            display: block;
            font-size: 14px;
            color: var(--blood);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .stat-box span {
            font-size: 24px;
        }

        .section-title {
            font-size: 26px;
            text-align: center;
            background: var(--ink);
            color: var(--paper);
            margin: 40px 0 25px 0;
            padding: 5px;
            letter-spacing: 5px;
        }

        .kin-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .kin-card {
            background: rgba(0,0,0,0.08);
            padding: 8px;
            border: 1px solid var(--ink);
            transition: 0.3s cubic-bezier(0.5, 1.5, 0.5, 1);
            filter: grayscale(1) contrast(1.2) sepia(0.3);
        }

        .kin-card:hover {
            transform: scale(1.25) rotate(5deg);
            filter: none;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: var(--paper);
        }

        .kin-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-bottom: 1px solid var(--ink);
        }

        .kin-info {
            font-size: 11px;
            margin-top: 8px;
            text-align: center;
            font-weight: bold;
        }

        .reward-banner {
            margin-top: 50px;
            font-size: 35px;
            border-top: 4px solid var(--ink);
            padding-top: 20px;
            color: var(--blood);
            text-align: center;
            font-weight: bold;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(139, 0, 0, 0); }
            100% { transform: scale(1); }
        }

        .contact-btn {
            display: block;
            width: fit-content;
            margin: 30px auto 0;
            padding: 20px 50px;
            background: var(--blood);
            color: white;
            text-decoration: none;
            font-size: 24px;
            animation: pulse 2s infinite;
            border: 2px solid #000;
        }
    </style>
</head>
<body>

    <div class="poster">
        
        <div class="header-section">
            <h1 class="header-wanted">WANTED</h1>

        <div class="kin-grid">
            <div class="kin-card">

            </div>

            </div>
            <div class="kin-card">
                <img src="mikan.png" alt="Mikan">

            </div>
            <div class="kin-card">
                <img src="natsuki.png" alt="Natsuki">

            <div class="kin-card">

            <div class="kin-card">
                <img src="toko fukawa.png" alt="Toko">

        </div>

        <div class="reward-banner">
            REWARD: 1,000,000 EXP
        </div>

        <a href="https://t.me/DZARQ" target="_blank" class="contact-btn">TURN SELF IN</a>
    </div>

</body>
</html>
